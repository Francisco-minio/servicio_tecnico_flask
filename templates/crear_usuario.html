{% extends 'form_base.html' %} {% block title %}Crear Usuario{% endblock %} {% block form_title %}Crear Usuario{% endblock %} {% block form_content %}
<div class="form-group">
    <label for="username">Nombre de usuario</label>
    <input type="text" name="username" class="form-control" required>
</div>

<div class="form-group">
    <label for="correo">Correo</label>
    <input type="email" name="correo" class="form-control" required>
</div>

<div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" name="password" class="form-control" required>
</div>

<div class="form-group">
    <label for="rol">Rol</label>
    <select name="rol" class="form-control" required>
        <option value="admin">Administrador</option>
        <option value="tecnico">Técnico</option>
    </select>
</div>
{% endblock %} {% block submit_text %}Crear{% endblock %} {% block cancel_url %}{{ url_for('admin.ver_usuarios') }}{% endblock %}
