{% extends 'form_base.html' %} {% block title %}Editar Usuario{% endblock %} {% block form_title %}Editar Usuario{% endblock %} {% block form_content %}
<div class="form-group">
    <label for="username">Nombre de usuario</label>
    <input type="text" name="username" value="{{ usuario.username }}" class="form-control" required>
</div>

<div class="form-group">
    <label for="correo">Correo electrónico</label>
    <input type="email" name="correo" value="{{ usuario.correo }}" class="form-control" required>
</div>

<div class="form-group">
    <label for="rol">Rol</label>
    <select name="rol" class="form-control" required>
        <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
        <option value="tecnico" {% if usuario.rol == 'tecnico' %}selected{% endif %}>Técnico</option>
        <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
    </select>
</div>

<div class="form-group">
    <label for="password">Nueva contraseña (dejar en blanco para no cambiarla)</label>
    <input type="password" name="password" class="form-control">
</div>
{% endblock %} {% block submit_text %}Guardar Cambios{% endblock %} {% block cancel_url %}{{ url_for('admin.ver_usuarios') }}{% endblock %}
