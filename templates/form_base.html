{% extends "base.html" %} {% block content %}
<div class="container-fluid">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">{% block form_title %}{% endblock %}</h6>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {{ form.csrf_token if form else csrf_token() }} {% block form_content %}{% endblock %}
                <div class="form-group mt-3">
                    <button type="submit" class="btn btn-primary">{% block submit_text %}Guardar{% endblock %}</button>
                    <a href="{% block cancel_url %}javascript:history.back(){% endblock %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
